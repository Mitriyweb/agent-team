model_list:

  # ── Cloud models ───────────────────────────────────────────────
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-opus
    litellm_params:
      model: anthropic/claude-opus-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  # ── Local models ───────────────────────────────────────────────
  - model_name: qwen3-coder
    litellm_params:
      model: ollama/qwen3-coder:30b-q4_K_M
      api_base: http://ollama:11434

litellm_settings:
  request_timeout: 600      # 10 min — local model can be slow
  num_retries: 2

router_settings:
  # If local model is unavailable, fall back to cloud
  fallbacks:
    - qwen3-coder:
        - claude-sonnet

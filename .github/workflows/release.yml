name: Release

on:
  push:
    branches:
      - main
    paths:
      - package.json
    tags:
      - "v*"

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release: ${{ steps.check.outputs.release }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version and tag
        id: check
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "Triggered by tag: ${{ github.ref_name }}"
            echo "release=true" >> $GITHUB_OUTPUT
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            VERSION=$(jq -r .version package.json)
            TAG="v$VERSION"
            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "Tag $TAG already exists. Skipping release."
              echo "release=false" >> $GITHUB_OUTPUT
            else
              echo "New version detected: $VERSION. Creating tag $TAG."
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git tag "$TAG"
              git push origin "$TAG"
              echo "release=true" >> $GITHUB_OUTPUT
              echo "tag=$TAG" >> $GITHUB_OUTPUT
            fi
          fi

  validate:
    needs: prepare
    if: needs.prepare.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run validate

  build:
    needs: [prepare, validate]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            asset: agent-team-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            asset: agent-team-linux-arm64
          - os: macos-latest
            target: bun-darwin-arm64
            asset: agent-team-darwin-arm64
          - os: macos-latest
            target: bun-darwin-x64
            asset: agent-team-darwin-x64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Bundle agents
        run: bun lib/bundle-agents.ts

      - name: Build binary
        run: mkdir -p tmp && cd tmp && bun build ../bin/init.ts --compile --target=${{ matrix.target }} --outfile ../dist/${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: |
            install.sh
            dist/agent-team-*
          generate_release_notes: true

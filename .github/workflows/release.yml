name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            asset: agent-team-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            asset: agent-team-linux-arm64
          - os: macos-latest
            target: bun-darwin-arm64
            asset: agent-team-darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            asset: agent-team-darwin-x64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Validate
        run: bun run validate

      - name: Test
        run: bun run test

      - name: Build binary
        run: bun build ./bin/init.js --compile --target=${{ matrix.target }} --outfile dist/${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            install.sh
            dist/agent-team-*
          generate_release_notes: true

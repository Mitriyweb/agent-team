name: Release

on:
  push:
    branches:
      - main
    paths:
      - package.json
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, detect the version and report but do not create tag or release"
        type: boolean
        default: false

# Prevent two concurrent releases from racing on tag creation.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release: ${{ steps.check.outputs.release }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version and tag
        id: check
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          set -euo pipefail

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "Triggered by tag: ${{ github.ref_name }}"
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          VERSION=$(jq -r .version package.json)
          if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then
            echo "::error::package.json has no 'version' field (got: '$VERSION')"
            exit 1
          fi
          TAG="v$VERSION"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists. Skipping release."
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "DRY RUN: would create annotated tag $TAG and push it."
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "New version detected: $VERSION. Creating tag $TAG via GitHub API."
          # Create the tag via the REST API so GitHub signs the ref with its
          # own verified signature (badge "Verified" on GitHub UI). A plain
          # `git tag -a ... && git push` would push an unsigned tag object.
          SHA="${{ github.sha }}"
          HTTP_CODE=$(curl -sS -o /tmp/tag-resp.json -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs" \
            -d "{\"ref\":\"refs/tags/$TAG\",\"sha\":\"$SHA\"}")
          if [[ "$HTTP_CODE" != "201" ]]; then
            echo "::error::Failed to create tag $TAG via API (HTTP $HTTP_CODE)"
            cat /tmp/tag-resp.json
            exit 1
          fi
          echo "Tag $TAG created (verified)."
          echo "release=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  validate:
    needs: prepare
    if: needs.prepare.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run validate

  build:
    needs: [prepare, validate]
    if: needs.prepare.outputs.release == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            asset: agent-team-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            asset: agent-team-linux-arm64
          - os: macos-latest
            target: bun-darwin-arm64
            asset: agent-team-darwin-arm64
          - os: macos-latest
            target: bun-darwin-x64
            asset: agent-team-darwin-x64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Bundle agents
        run: bun lib/bundle-agents.ts

      - name: Build binary
        run: mkdir -p tmp && cd tmp && bun build ../bin/init.ts --compile --target=${{ matrix.target }} --outfile ../dist/${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  release:
    needs: [prepare, build]
    # Run once per tagged release. We can't gate on `startsWith(github.ref,
    # 'refs/tags/')` because GitHub Actions does NOT trigger workflows for
    # commits/tags pushed by GITHUB_TOKEN — so the branch-triggered run is
    # the only one we get. `prepare` ensures release=true only when a brand
    # new tag was created (or the workflow was fired by a manual tag push).
    if: needs.prepare.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: |
            install.sh
            dist/agent-team-*
          generate_release_notes: true

repos:
  - repo: local
    hooks:
      - id: markdownlint-cli2
        name: markdownlint-cli2
        language: system
        entry: bun run lint
        pass_filenames: false
        always_run: true
      - id: biome
        name: biome check
        language: system
        entry: bun run check
        pass_filenames: false
        always_run: true
      - id: audit
        name: bun audit
        language: system
        entry: bun audit --audit-level=high
        pass_filenames: false
        always_run: true

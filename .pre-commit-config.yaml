repos:
  - repo: local
    hooks:
      - id: markdownlint-cli2
        name: markdownlint-cli2
        language: system
        entry: bun run lint:fix
        pass_filenames: false
        always_run: true
      - id: biome
        name: biome check
        language: system
        entry: bun run check:fix
        pass_filenames: false
        always_run: true
      - id: audit
        name: bun audit
        language: system
        entry: bun audit --audit-level=high
        pass_filenames: false
        always_run: true
      - id: typecheck
        name: typecheck
        language: system
        entry: bun run typecheck
        pass_filenames: false
        always_run: true
      - id: validate
        name: validate
        language: system
        entry: bun run validate
        pass_filenames: false
        always_run: true
      - id: build
        name: build
        language: system
        entry: bun run build:local
        pass_filenames: false
        always_run: true

